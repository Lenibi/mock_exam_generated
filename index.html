<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Exam</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    background: #16213e;
    border-bottom: 2px solid #0f3460;
    font-size: 1.1rem;
  }
  .topbar .score { font-weight: 700; }
  .topbar .progress { color: #aaa; }

  /* Home screen */
  #home {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 32px;
  }
  #home h1 { font-size: 2.2rem; }
  #home p { color: #aaa; }

  .exam-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 400px;
  }
  .exam-btn {
    background: #16213e;
    border: 2px solid #0f3460;
    color: #eee;
    padding: 18px 24px;
    border-radius: 10px;
    font-size: 1.15rem;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .exam-btn:hover { border-color: #533483; background: #1a2744; }

  .divider {
    color: #555;
    font-size: 0.9rem;
    text-align: center;
  }

  .file-upload-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* Quiz screen (multiple choice) */
  #quiz {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 24px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }

  .q-number { color: #888; font-size: 0.95rem; }
  .q-text { font-size: 1.4rem; line-height: 1.5; text-align: center; }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 600px;
  }
  .choice-btn {
    background: #16213e;
    border: 2px solid #0f3460;
    color: #eee;
    padding: 14px 20px;
    border-radius: 8px;
    font-size: 1.05rem;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }
  .choice-btn:hover { border-color: #533483; }
  .choice-btn.selected { border-color: #e94560; background: #2a1a3e; }
  .choice-btn.correct-flash { background: #c9a800 !important; color: #000 !important; border-color: #c9a800 !important; }

  .nav-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    background: #533483;
    color: #eee;
    border: none;
    padding: 10px 24px;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #6a42a0; }
  button:disabled { opacity: 0.4; cursor: default; }
  .btn-show { background: #0f3460; }
  .btn-exit { background: #e94560; }
  .btn-file { background: #0f3460; }

  .hidden-input { display: none; }

  /* Written quiz screen */
  #writtenQuiz {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 24px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }

  .written-answer-box {
    width: 100%;
    max-width: 600px;
    min-height: 120px;
    background: #16213e;
    border: 2px solid #0f3460;
    color: #eee;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 1.05rem;
    font-family: inherit;
    resize: vertical;
  }
  .written-answer-box:focus { outline: none; border-color: #533483; }

  .model-answer {
    width: 100%;
    max-width: 600px;
    background: #0f3460;
    border: 2px solid #533483;
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 1.05rem;
    line-height: 1.6;
  }
  .model-answer-label {
    font-weight: 700;
    color: #c9a800;
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div class="topbar" id="topbar" style="display:none;">
  <button class="btn-exit" onclick="goHome()">Exit</button>
  <span class="score" id="scoreDisplay">0% — 0/0</span>
  <span class="progress" id="progressDisplay">Q 1 / 70</span>
</div>

<!-- Home -->
<div id="home">
  <h1>Mock Exam</h1>
  <p>Choose a practice exam or load your own</p>

  <div class="exam-list">
    <div class="divider">— Original Practice Exam —</div>
    <button class="exam-btn" onclick="loadExam('exam_jsons/original_practice_exam/joslin_mc.json')">Original — Multiple Choice (107 Qs)</button>
    <button class="exam-btn" onclick="loadWrittenExam('exam_jsons/original_practice_exam/joslin_written.json')">Original — Written (34 Qs)</button>

    <div class="divider">— Variant 1 (from slides) —</div>
    <button class="exam-btn" onclick="loadExam('exam_jsons/variant 1/variant1_mc.json')">Variant 1 — Multiple Choice (105 Qs)</button>
    <button class="exam-btn" onclick="loadWrittenExam('exam_jsons/variant 1/variant1_written.json')">Variant 1 — Written (30 Qs)</button>
  </div>

  <div class="divider">— or —</div>

  <div class="file-upload-row">
    <button class="btn-file" onclick="document.getElementById('fileInput').click()">Load JSON File</button>
    <input type="file" id="fileInput" class="hidden-input" accept=".json" />
  </div>
</div>

<!-- Multiple Choice Quiz -->
<div id="quiz">
  <div class="q-number" id="qNumber"></div>
  <div class="q-text" id="qText"></div>
  <div class="choices" id="choices"></div>
  <div class="nav-row">
    <button id="prevBtn" onclick="go(-1)">&larr; Prev</button>
    <button class="btn-show" id="showBtn" onclick="flashAnswer()">Show Answer</button>
    <button id="nextBtn" onclick="go(1)">Next &rarr;</button>
  </div>
</div>

<!-- Written Quiz -->
<div id="writtenQuiz">
  <div class="q-number" id="wqNumber"></div>
  <div class="q-text" id="wqText"></div>
  <textarea class="written-answer-box" id="wqAnswer" placeholder="Type your answer here..."></textarea>
  <div id="wqModelAnswer" style="display:none;" class="model-answer">
    <div class="model-answer-label">Model Answer</div>
    <div id="wqModelText"></div>
  </div>
  <div class="nav-row">
    <button id="wPrevBtn" onclick="wGo(-1)">&larr; Prev</button>
    <button class="btn-show" id="wShowBtn" onclick="toggleModelAnswer()">Show Answer</button>
    <button id="wNextBtn" onclick="wGo(1)">Next &rarr;</button>
  </div>
</div>

<script>
// ===================== MULTIPLE CHOICE =====================
let questions = [];
let current = 0;
let userAnswers = [];

function parseQuestions(raw) {
  let data = typeof raw === 'string' ? JSON.parse(raw) : raw;
  if (!Array.isArray(data)) {
    const keys = Object.keys(data);
    for (const k of keys) {
      if (Array.isArray(data[k])) { data = data[k]; break; }
    }
  }
  if (!Array.isArray(data)) throw new Error('Could not find an array of questions in the JSON');

  return data.map((q, i) => {
    let answers = q.answers || q.options || q.choices || [];
    if (answers && !Array.isArray(answers)) {
      answers = ['A','B','C','D'].map(k => answers[k]).filter(Boolean);
    }
    if (!answers || answers.length === 0) {
      answers = [];
      ['A','B','C','D'].forEach(k => { if (q[k]) answers.push(q[k]); });
    }

    let correctIdx = 0;
    const c = q.correct ?? q.correct_answer ?? q.answer ?? q.correctAnswer ?? 0;
    if (typeof c === 'number') {
      correctIdx = c;
      if (correctIdx >= 1 && correctIdx <= 4 && answers.length === 4) correctIdx -= 1;
    } else if (typeof c === 'string') {
      const letterIdx = 'ABCD'.indexOf(c.trim().toUpperCase());
      if (letterIdx !== -1 && c.trim().length === 1) {
        correctIdx = letterIdx;
      } else {
        const idx = answers.findIndex(a => a === c || a.replace(/^[A-D][.)]\s*/, '') === c);
        correctIdx = idx !== -1 ? idx : 0;
      }
    }

    return {
      number: q.number || i + 1,
      lecture: q.lecture_number || q.lecture || null,
      question: q.question || q.text || q.prompt || '',
      answers,
      correctIdx
    };
  });
}

function startExam(data) {
  questions = parseQuestions(data);
  userAnswers = new Array(questions.length).fill(-1);
  current = 0;
  document.getElementById('home').style.display = 'none';
  document.getElementById('quiz').style.display = 'flex';
  document.getElementById('topbar').style.display = 'flex';
  render();
}

function goHome() {
  questions = [];
  userAnswers = [];
  current = 0;
  wQuestions = [];
  wUserAnswers = [];
  wCurrent = 0;
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('writtenQuiz').style.display = 'none';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
}

async function loadExam(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('File not found: ' + url);
    const data = await res.json();
    startExam(data);
  } catch (e) {
    alert(e.message);
  }
}

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { try { startExam(reader.result); } catch (err) { alert('Error: ' + err.message); } };
  reader.readAsText(file);
  e.target.value = '';
});

function render() {
  const q = questions[current];
  const lecturePart = q.lecture ? `  (Lecture ${q.lecture})` : '';
  document.getElementById('qNumber').textContent = `Question ${q.number} of ${questions.length}${lecturePart}`;
  document.getElementById('qText').textContent = q.question;
  document.getElementById('progressDisplay').textContent = `Q ${current + 1} / ${questions.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === questions.length - 1;

  const container = document.getElementById('choices');
  container.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  q.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `${labels[i]}.  ${ans}`;
    if (userAnswers[current] === i) btn.classList.add('selected');
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  updateScore();
}

function selectAnswer(i) {
  userAnswers[current] = i;
  render();
}

function flashAnswer() {
  const q = questions[current];
  const btns = document.querySelectorAll('.choice-btn');
  btns[q.correctIdx].classList.add('correct-flash');
  setTimeout(() => {
    btns[q.correctIdx].classList.remove('correct-flash');
  }, 500);
}

function go(dir) {
  current += dir;
  if (current < 0) current = 0;
  if (current >= questions.length) current = questions.length - 1;
  render();
}

function updateScore() {
  let answered = 0, correct = 0;
  for (let i = 0; i < questions.length; i++) {
    if (userAnswers[i] !== -1) {
      answered++;
      if (userAnswers[i] === questions[i].correctIdx) correct++;
    }
  }
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('scoreDisplay').textContent = `${pct}% — ${correct}/${answered} answered`;
}

// ===================== WRITTEN QUIZ =====================
let wQuestions = [];
let wCurrent = 0;
let wUserAnswers = [];

async function loadWrittenExam(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('File not found: ' + url);
    const data = await res.json();
    startWrittenExam(data);
  } catch (e) {
    alert(e.message);
  }
}

function startWrittenExam(data) {
  wQuestions = typeof data === 'string' ? JSON.parse(data) : data;
  wUserAnswers = new Array(wQuestions.length).fill('');
  wCurrent = 0;
  document.getElementById('home').style.display = 'none';
  document.getElementById('writtenQuiz').style.display = 'flex';
  document.getElementById('topbar').style.display = 'flex';
  wRender();
}

function wRender() {
  const q = wQuestions[wCurrent];
  const wLecturePart = q.lecture_number ? `  (Lecture ${q.lecture_number})` : '';
  document.getElementById('wqNumber').textContent = `Question ${q.number} of ${wQuestions[wQuestions.length - 1].number} (${wCurrent + 1}/${wQuestions.length})${wLecturePart}`;
  document.getElementById('wqText').textContent = q.question;
  document.getElementById('progressDisplay').textContent = `Q ${wCurrent + 1} / ${wQuestions.length}`;
  document.getElementById('scoreDisplay').textContent = 'Written — no scoring';
  document.getElementById('wPrevBtn').disabled = wCurrent === 0;
  document.getElementById('wNextBtn').disabled = wCurrent === wQuestions.length - 1;

  document.getElementById('wqAnswer').value = wUserAnswers[wCurrent];
  document.getElementById('wqModelAnswer').style.display = 'none';
  document.getElementById('wShowBtn').textContent = 'Show Answer';
}

function toggleModelAnswer() {
  const el = document.getElementById('wqModelAnswer');
  if (el.style.display === 'none') {
    document.getElementById('wqModelText').textContent = wQuestions[wCurrent].answer;
    el.style.display = 'block';
    document.getElementById('wShowBtn').textContent = 'Hide Answer';
  } else {
    el.style.display = 'none';
    document.getElementById('wShowBtn').textContent = 'Show Answer';
  }
}

function wGo(dir) {
  // save current typed answer
  wUserAnswers[wCurrent] = document.getElementById('wqAnswer').value;
  wCurrent += dir;
  if (wCurrent < 0) wCurrent = 0;
  if (wCurrent >= wQuestions.length) wCurrent = wQuestions.length - 1;
  wRender();
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
  const mcVisible = document.getElementById('quiz').style.display !== 'none';
  const wVisible = document.getElementById('writtenQuiz').style.display !== 'none';

  if (mcVisible) {
    if (e.key === 'ArrowRight' || e.key === 'd') go(1);
    else if (e.key === 'ArrowLeft' || e.key === 'a') go(-1);
    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flashAnswer(); }
    else if (e.key === '1') selectAnswer(0);
    else if (e.key === '2') selectAnswer(1);
    else if (e.key === '3') selectAnswer(2);
    else if (e.key === '4') selectAnswer(3);
    else if (e.key === 'Escape') goHome();
  } else if (wVisible) {
    // only handle nav keys when textarea is NOT focused
    if (document.activeElement !== document.getElementById('wqAnswer')) {
      if (e.key === 'ArrowRight' || e.key === 'd') wGo(1);
      else if (e.key === 'ArrowLeft' || e.key === 'a') wGo(-1);
      else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleModelAnswer(); }
    }
    if (e.key === 'Escape') goHome();
  }
});
</script>
</body>
</html>
